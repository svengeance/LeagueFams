<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeagueFams Mutual Match Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>LeagueFams Mutual Match Tracker</h1>
      <form id="analyze-form" class="card">
        <label>
          Summoner Riot IDs (comma separated):
          <input id="summoners" name="summoners" placeholder="PlayerOne#NA1, PlayerTwo#NA1" required />
        </label>
        <div class="grid-2">
          <label>
            Start date
            <input id="start-date" name="start-date" type="date" required />
          </label>
          <label>
            End date
            <input id="end-date" name="end-date" type="date" required />
          </label>
        </div>
        <div class="grid-2">
          <label>
            Platform (Account API)
            <input id="platform" name="platform" value="na1" required />
          </label>
          <label>
            Region (Match API)
            <input id="region" name="region" value="americas" required />
          </label>
        </div>
        <button type="submit">Load Mutual Games</button>
      </form>

      <section id="status"></section>
      <section id="stats" class="section"></section>
      <section id="games" class="section game-grid"></section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
